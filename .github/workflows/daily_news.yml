name: Fetch Tech News

on:
  # Run once daily at 07:00 UTC
  schedule:
    - cron: '0 7 * * *'

  # Allow manual trigger
  workflow_dispatch:

# Required permissions for pushing changes
permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch news articles
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/fetch_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "newsbot@federicosella.com"
          git add content/news/ scripts/.news_cache.json

          # Push if there are staged changes (checkout token handles auth)
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-fetch tech news $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
