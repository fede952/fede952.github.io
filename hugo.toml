baseURL = 'https://federicosella.com/'
buildFuture = true
languageCode = 'en-us'
title = 'Federico Sella'
theme = 'PaperMod'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true

# Fondamentale per evitare conflitti URL
[permalinks]
  posts = "/:year/:month/:title/"
  # :slugorcontentbasename — slug front matter if set, else the ASCII English
  # content filename (shared by all 12 translations). The previous :slug token
  # fell back to the LOCALIZED TITLE, so Devanagari/Arabic/CJK titles (3 bytes
  # per char in UTF-8) produced output directories over ext4's 255-byte
  # filename limit and crashed the Ubuntu CI build ("file name too long").
  news = "/news/:year/:month/:slugorcontentbasename/"

# Taxonomies per categorizzazione contenuti
[taxonomies]
  category = "categories"
  tag = "tags"
  news-category = "news-categories"

# Related-content config: powers Hugo's `.Related` function used by
# news/single.html's "Related Posts" block.
[related]
  threshold = 60
  toLower = true
  includeNewer = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "news-categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

# Sitemap configuration for SEO
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Google Analytics 4
[services]
  [services.googleAnalytics]
    ID = 'G-MDQF90PHTW'

[params]
  mainSections = ["news", "tools", "learn"]
  defaultTheme = "dark"
  # Dark-only platform (P4.2): every custom component (cards, accordions,
  # games, search palette) is designed on dark surfaces; light mode was
  # half-broken so the toggle is disabled rather than maintained.
  disableThemeToggle = true
  env = "production"
  title = "Federico Sella"
  description = "Free, privacy-first web utilities that run 100% in your browser — password security, image compression, QR codes and developer tools, plus practical guides and cheatsheets."
  keywords = ["free online tools", "web utilities", "privacy-first tools", "password generator", "image compressor", "qr code generator", "developer tools", "browser tools", "Federico Sella"]
  author = "Federico Sella"
  images = ["images/social-banner.png"]
  ShowShareButtons = true

  # Homepage "Featured Tools" (P4.1): resolved per-language via site.GetPage,
  # so cards pick up localized titles/descriptions automatically.
  # NOTE: must stay ABOVE the [params.*] sub-tables — TOML assigns any
  # key/value after a table header to that table.
  featured_tool_pages = [
    "/tools/pass-fort",
    "/tools/pixel-shrink",
    "/tools/qr-generator",
    "/tools/freelance-calculator",
    "/tools/exif-cleaner",
    "/tools/netguard",
  ]

  [params.assets]
    favicon = "/favicon.png"
    favicon16x16 = "/favicon.png"
    favicon32x32 = "/favicon.png"
    apple_touch_icon = "/favicon.png"

  [params.profileMode]
    enabled = false # P4.1: the homepage is a SaaS-style landing; the bio lives on /about/
    title = "Federico Sella"
    subtitle = "Software Developer (.NET / C#) | AI Integration Specialist | Cybersecurity Enthusiast (eJPT) | Full Stack Experimenter"
    imageUrl = "images/logo.webp"
    imageTitle = "Federico Sella"
    buttons = [
      { name = "About Me", url = "about/" },
      { name = "My Projects", url = "projects/" },
      { name = "Contact", url = "mailto:fedesella95@gmail.com" }
    ]
    
    [[params.socialIcons]]
      name = "linkedin"
      url = "https://linkedin.com/in/federicosella"
    [[params.socialIcons]]
      name = "github"
      url = "https://github.com/fede952"
    [params.label]
    text = "Federico Sella"
    icon = "images/logo.webp" # Questo mette il logo piccolo in alto a sinistra vicino al nome
    iconHeight = 35

