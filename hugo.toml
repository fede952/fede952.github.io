baseURL = 'https://federicosella.com/'
buildFuture = true
languageCode = 'en-us'
title = 'Federico Sella'
theme = 'PaperMod'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true

# Fondamentale per evitare conflitti URL
[permalinks]
  posts = "/:year/:month/:title/"
  news = "/news/:year/:month/:slug/"

# Taxonomies per categorizzazione contenuti
[taxonomies]
  category = "categories"
  tag = "tags"
  news-category = "news-categories"

# Related-content config: powers Hugo's `.Related` function used by
# news/single.html's "Related Posts" block.
[related]
  threshold = 60
  toLower = true
  includeNewer = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "news-categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

# Sitemap configuration for SEO
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Google Analytics 4
[services]
  [services.googleAnalytics]
    ID = 'G-MDQF90PHTW'

[params]
  mainSections = ["news", "tools", "learn"]
  defaultTheme = "dark"
  env = "production"
  title = "Federico Sella"
  description = "Portfolio of Federico Sella - Security Developer, SOC Analyst & Red Team Enthusiast. Expert in Industrial Automation (CNC) bridging OT and IT Security."
  keywords = ["Federico Sella", "Cybersecurity Portfolio", "Red Team", "SOC Analyst", "Industrial Cybersecurity", "CNC Programmer", "Python Developer", "Bergamo"]
  author = "Federico Sella"
  images = ["images/social-banner.png"]
  ShowShareButtons = true

  [params.assets]
    favicon = "/favicon.png"
    favicon16x16 = "/favicon.png"
    favicon32x32 = "/favicon.png"
    apple_touch_icon = "/favicon.png"

  [params.profileMode]
    enabled = true
    title = "Federico Sella"
    subtitle = "Software Developer (.NET / C#) | AI Integration Specialist | Cybersecurity Enthusiast (eJPT) | Full Stack Experimenter"
    imageUrl = "images/logo.webp"
    imageTitle = "Federico Sella"
    buttons = [
      { name = "About Me", url = "about/" },
      { name = "My Projects", url = "projects/" },
      { name = "Contact", url = "mailto:fedesella95@gmail.com" }
    ]
    
    [[params.socialIcons]]
      name = "linkedin"
      url = "https://linkedin.com/in/federicosella"
    [[params.socialIcons]]
      name = "github"
      url = "https://github.com/fede952"
    [params.label]
    text = "Federico Sella"
    icon = "images/logo.webp" # Questo mette il logo piccolo in alto a sinistra vicino al nome
    iconHeight = 35

  [[params.featured_tools]]
    name = "RateMate 💰"
    description = "Freelance Income & Tax Calculator"
    url = "tools/freelance-calculator/"
    color = "linear-gradient(135deg, #10b981 0%, #059669 100%)"

  [[params.featured_tools]]
    name = "ReflexGrid 🎯"
    description = "Pro Aim Trainer & Reaction Test"
    url = "tools/reflex-grid/"
    color = "linear-gradient(135deg, #ef4444 0%, #b91c1c 100%)"

  [[params.featured_tools]]
    name = "PassFort 🛡️"
    description = "Password Security Auditor"
    url = "tools/pass-fort/"
    color = "linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%)"

