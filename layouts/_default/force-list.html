{{ define "main" }}
<main class="main">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Description }}<div class="post-description">{{ .Description }}</div>{{ end }}
  </header>

  {{/* Card styles live in assets/css/extended/cyber-cards.css (shared with
       the homepage) — extracted from the inline <style> that was here. */}}
  {{ $currentSection := .Section }}
  {{ $currentLang := .Lang }}
  {{ $isHub := and (eq .Kind "section") (in (slice "learn" "tools") $currentSection) (eq .Parent.Kind "home") }}

  {{ if $isHub }}
    {{/* Hub mode: group by sub-section. Direct child pages first, then a
         labeled grid per sub-section. */}}
    {{ $hubURL := .RelPermalink }}
    {{ $direct := slice }}
    {{ range .RegularPages }}
      {{ if and .Parent (eq .Parent.RelPermalink $hubURL) }}
        {{ $direct = $direct | append . }}
      {{ end }}
    {{ end }}
    {{ if $direct }}
      {{ $featured := where $direct "Params.featured" true }}
      {{ $regular := where $direct "Params.featured" "!=" true }}
      {{ $regular = $regular.ByDate.Reverse }}
      {{ $direct = $featured | append $regular }}
      <div class="cyber-grid">
        {{ range $direct }}
          {{ partial "cyber-card.html" . }}
        {{ end }}
      </div>
    {{ end }}

    {{/* Each sub-section group shows up to 5 most-recent posts; an overflow
         link points to the sub-section's own paginated list page. */}}
    {{ $hubLimit := 5 }}
    {{ range .Sections.ByTitle }}
      {{ $children := .RegularPagesRecursive.ByDate.Reverse }}
      {{ if $children }}
        {{ $shown := first $hubLimit $children }}
        {{ $overflow := gt (len $children) $hubLimit }}
        <h2 class="hub-group-heading">
          <a href="{{ .Permalink }}">{{ .Title }}</a>
        </h2>
        {{ with .Description }}<p class="hub-group-desc">{{ . }}</p>{{ end }}
        <div class="cyber-grid">
          {{ range $shown }}
            {{ partial "cyber-card.html" . }}
          {{ end }}
        </div>
        {{ if $overflow }}
          <a class="hub-view-all" href="{{ .Permalink }}">{{ i18n "view_all" .Title }}</a>
        {{ end }}
      {{ end }}
    {{ end }}
  {{ else }}
    {{ $items := .RegularPagesRecursive }}

    {{/* NEWS: local-language pages plus, per story, the English page ONLY
         when no local translation exists. lang.Merge fills untranslated
         stories from the EN collection via translation-key matching — the
         old local∪English union listed every translated story twice on
         non-English lists. */}}
    {{ if eq $currentSection "news" }}
      {{ if ne $currentLang "en" }}
        {{ range .AllTranslations }}
          {{ if eq .Lang "en" }}
            {{ $items = $items | lang.Merge .RegularPagesRecursive }}
          {{ end }}
        {{ end }}
      {{ end }}
      {{ $items = $items.ByDate.Reverse }}
    {{ else }}
      {{/* Standard Logic for sub-section pages: pull only this section's
          pages so e.g. /tools/games/ doesn't list non-game tools. */}}
      {{ if not $items }}
        {{ $items = where site.RegularPages "Section" $currentSection }}
      {{ end }}
    {{ end }}

    {{ $items = where $items "Kind" "page" }}

    {{/* 24/page fills the 3-column cyber-grid evenly; /news/ previously
         rendered every article on a single page (1.4–3.2 MB of HTML). */}}
    {{ $paginator := .Paginate $items 24 }}

    <div class="cyber-grid">
      {{ range $paginator.Pages }}
        {{ partial "cyber-card.html" . }}
      {{ end }}
    </div>

    {{ if gt $paginator.TotalPages 1 }}
    <footer class="page-footer">
      <nav class="pagination">
        {{- if $paginator.HasPrev }}
        <a class="prev" href="{{ $paginator.Prev.URL | absURL }}">«&nbsp;{{ i18n "prev_page" }}&nbsp;{{ sub $paginator.PageNumber 1 }}/{{ $paginator.TotalPages }}</a>
        {{- end }}
        {{- if $paginator.HasNext }}
        <a class="next" href="{{ $paginator.Next.URL | absURL }}">{{ i18n "next_page" }}&nbsp;{{ add 1 $paginator.PageNumber }}/{{ $paginator.TotalPages }}&nbsp;»</a>
        {{- end }}
      </nav>
    </footer>
    {{ end }}
  {{ end }}
</main>
{{ end }}
