<!-- Social Share Buttons - Cyber Minimal Design -->
<div class="social-share-bar">
  <span class="share-label">
    {{ if eq .Page.Language.Lang "it" }}
      Condividi:
    {{ else if eq .Page.Language.Lang "es" }}
      Compartir:
    {{ else if eq .Page.Language.Lang "fr" }}
      Partager:
    {{ else if eq .Page.Language.Lang "de" }}
      Teilen:
    {{ else if eq .Page.Language.Lang "pt" }}
      Compartilhar:
    {{ else }}
      Share:
    {{ end }}
  </span>

  <div class="share-icons">
    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlize }}"
       target="_blank"
       rel="noopener noreferrer"
       class="share-icon linkedin"
       title="Share on LinkedIn"
       aria-label="Share on LinkedIn">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
        <rect x="2" y="9" width="4" height="12"></rect>
        <circle cx="4" cy="4" r="2"></circle>
      </svg>
    </a>

    <!-- X/Twitter -->
    <a href="https://twitter.com/intent/tweet?url={{ .Permalink | urlize }}&text={{ .Title | urlize }}"
       target="_blank"
       rel="noopener noreferrer"
       class="share-icon twitter"
       title="Share on X/Twitter"
       aria-label="Share on X/Twitter">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4l11.733 16h4.267l-11.733 -16z"></path>
        <path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path>
      </svg>
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/?text={{ .Title | urlize }}%20{{ .Permalink | urlize }}"
       target="_blank"
       rel="noopener noreferrer"
       class="share-icon whatsapp"
       title="Share on WhatsApp"
       aria-label="Share on WhatsApp">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21l1.65 -3.8a9 9 0 1 1 3.4 2.9l-5.05 .9"></path>
        <path d="M9 10a.5 .5 0 0 0 1 0v-1a.5 .5 0 0 0 -1 0v1a5 5 0 0 0 5 5h1a.5 .5 0 0 0 0 -1h-1a.5 .5 0 0 0 0 1"></path>
      </svg>
    </a>

    <!-- Telegram -->
    <a href="https://t.me/share/url?url={{ .Permalink | urlize }}&text={{ .Title | urlize }}"
       target="_blank"
       rel="noopener noreferrer"
       class="share-icon telegram"
       title="Share on Telegram"
       aria-label="Share on Telegram">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 10l-4 4l6 6l4 -16l-18 7l4 2l2 6l3 -4"></path>
      </svg>
    </a>

    <!-- Email -->
    <a href="mailto:?subject={{ .Title | urlize }}&body={{ if eq .Page.Language.Lang "it" }}Guarda questo articolo:%20{{ .Permalink | urlize }}{{ else }}Check out this article:%20{{ .Permalink | urlize }}{{ end }}"
       class="share-icon email"
       title="Share via Email"
       aria-label="Share via Email">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
        <path d="M22 7l-10 7l-10 -7"></path>
      </svg>
    </a>
  </div>
</div>
